<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Teleprompter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #f0ede6;
    --muted: #6b6b6b;
    --red: #e05252;
    --green: #52c97a;
    --radius: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── EDITOR VIEW ── */
  #editor-view {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 20px;
    gap: 16px;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .brand {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
  }

  .control-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .slider {
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: background 0.2s;
  }

  .slider::-webkit-slider-thumb:hover { background: var(--accent2); }

  .slider-val {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: var(--radius);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
  }

  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  .textarea-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .textarea-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #script-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.65;
    padding: 20px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }

  #script-input:focus { border-color: var(--accent); }
  #script-input::placeholder { color: var(--muted); }

  .word-count {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-align: right;
  }

  /* ── MIRROR TOGGLE ── */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle {
    width: 36px;
    height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
    flex-shrink: 0;
  }

  .toggle.on { background: var(--accent); }

  .toggle::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: left 0.2s;
  }

  .toggle.on::after { left: 19px; }

  /* ── TELEPROMPTER VIEW ── */
  #prompter-view {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    flex-direction: column;
    overflow: hidden;
  }

  #prompter-view.active { display: flex; }

  .prompter-controls {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    gap: 12px;
    transition: opacity 0.3s;
  }

  .prompter-controls.hidden { opacity: 0; pointer-events: none; }

  .prompter-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
  }

  .prompter-btn:hover { background: rgba(255,255,255,0.14); }
  .prompter-btn.play { background: var(--green); border-color: var(--green); color: #000; }
  .prompter-btn.pause { background: #f0a030; border-color: #f0a030; color: #000; }
  .prompter-btn.stop { background: var(--red); border-color: var(--red); color: white; }

  .speed-display {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(200,169,110,0.12);
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid rgba(200,169,110,0.25);
  }

  .progress-bar-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.08);
    z-index: 200;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Focus indicator line */
  .focus-line {
    position: fixed;
    top: 50%;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(200,169,110,0.35);
    pointer-events: none;
    z-index: 150;
    transform: translateY(-80px);
  }

  /* Top/bottom gradient fade */
  .fade-top {
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;
    height: 100px;
    background: linear-gradient(to bottom, #000, transparent);
    pointer-events: none;
    z-index: 149;
  }

  .fade-bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(to top, #000, transparent);
    pointer-events: none;
    z-index: 149;
  }

  #scroll-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 120px 10% 300px;
    scrollbar-width: none;
  }

  #scroll-container::-webkit-scrollbar { display: none; }

  #prompter-text {
    font-size: 2.4rem;
    line-height: 1.7;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    text-align: center;
    max-width: 900px;
    margin: 0 auto;
    transition: transform 0.1s;
  }

  #prompter-text.mirrored { transform: scaleX(-1); }

  /* Tap zones (mobile) */
  .tap-zone {
    position: fixed;
    top: 60px;
    bottom: 0;
    width: 33%;
    z-index: 180;
    cursor: pointer;
  }

  #tap-left { left: 0; }
  #tap-right { right: 0; }
  #tap-center {
    left: 33%;
    width: 34%;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #editor-view { padding: 14px; gap: 12px; }

    .controls-row { gap: 8px; }

    .control-group { padding: 7px 10px; }

    .slider { width: 70px; }

    #prompter-text { font-size: 1.85rem; line-height: 1.65; }

    #scroll-container { padding: 120px 6% 260px; }

    .btn { padding: 9px 14px; font-size: 12px; }
  }

  @media (max-width: 400px) {
    #prompter-text { font-size: 1.55rem; }
  }

  /* Countdown overlay */
  #countdown-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 400;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
  }

  #countdown-overlay.active { display: flex; }

  #countdown-number {
    font-family: 'DM Mono', monospace;
    font-size: 9rem;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
    animation: pulseCount 1s ease-out;
  }

  @keyframes pulseCount {
    0% { transform: scale(1.3); opacity: 0; }
    40% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  #countdown-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  #countdown-skip {
    margin-top: 10px;
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
  }

  /* Hint toast */
  .hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 8px 18px;
    border-radius: 20px;
    z-index: 300;
    white-space: nowrap;
    transition: opacity 0.5s;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- ── EDITOR ── -->
<div id="editor-view">
  <div class="top-bar">
    <span class="brand">Teleprompter</span>
    <span class="word-count" id="word-count">0 words</span>
  </div>

  <div class="controls-row">
    <div class="control-group">
      <span class="control-label">Speed</span>
      <input type="range" class="slider" id="speed-slider" min="1" max="10" value="3">
      <span class="slider-val" id="speed-val">3</span>
    </div>

    <div class="control-group">
      <span class="control-label">Size</span>
      <input type="range" class="slider" id="size-slider" min="1" max="10" value="5">
      <span class="slider-val" id="size-val">5</span>
    </div>

    <div class="control-group toggle-wrap">
      <span class="control-label">Mirror</span>
      <button class="toggle" id="mirror-toggle" aria-label="Toggle mirror mode"></button>
    </div>

    <div class="control-group">
      <span class="control-label">Countdown</span>
      <input type="range" class="slider" id="countdown-slider" min="0" max="10" value="3" style="width:70px;">
      <span class="slider-val" id="countdown-val">3s</span>
    </div>

    <button class="btn btn-primary" id="start-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      Start
    </button>

    <button class="btn btn-ghost" id="clear-btn">Clear</button>
  </div>

  <div class="textarea-wrap">
    <span class="textarea-label">Your Script</span>
    <textarea id="script-input" placeholder="Paste or type your script here. Hit Start when you're ready.&#10;&#10;Keyboard shortcuts during playback:&#10;  Space  — play / pause&#10;  ↑ / ↓  — adjust speed&#10;  Esc    — return to editor"></textarea>
  </div>
</div>

<!-- ── TELEPROMPTER ── -->
<div id="prompter-view">
  <div class="prompter-controls" id="prompter-controls">
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="prompter-btn play" id="play-pause-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Play
      </button>
      <button class="prompter-btn stop" id="stop-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>
    </div>

    <div style="display:flex;gap:8px;align-items:center;">
      <button class="prompter-btn" id="speed-down-btn" title="Slower (↑)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span class="speed-display" id="live-speed">3</span>
      <button class="prompter-btn" id="speed-up-btn" title="Faster (↓)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="fade-top"></div>
  <div class="focus-line"></div>

  <div id="scroll-container">
    <div id="prompter-text"></div>
  </div>

  <div class="fade-bottom"></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>

  <!-- Mobile tap zones -->
  <div class="tap-zone" id="tap-left" title="Slower"></div>
  <div class="tap-zone" id="tap-center" title="Play / Pause"></div>
  <div class="tap-zone" id="tap-right" title="Faster"></div>
</div>

<div class="hint" id="hint" style="opacity:0"></div>

<div id="countdown-overlay">
  <div id="countdown-number">3</div>
  <div id="countdown-label">Get ready</div>
  <button id="countdown-skip">Skip countdown</button>
</div>

<script>
  // ── STATE ──
  let isPlaying = false;
  let scrollSpeed = 3;
  let rafId = null;
  let scrollPos = 0;
  let controlsVisible = true;
  let controlsTimeout = null;
  let isMirrored = false;

  // ── ELEMENTS ──
  const editorView = document.getElementById('editor-view');
  const prompterView = document.getElementById('prompter-view');
  const scriptInput = document.getElementById('script-input');
  const prompterText = document.getElementById('prompter-text');
  const scrollContainer = document.getElementById('scroll-container');
  const playPauseBtn = document.getElementById('play-pause-btn');
  const stopBtn = document.getElementById('stop-btn');
  const speedUpBtn = document.getElementById('speed-up-btn');
  const speedDownBtn = document.getElementById('speed-down-btn');
  const liveSpeed = document.getElementById('live-speed');
  const progressFill = document.getElementById('progress-fill');
  const prompterControls = document.getElementById('prompter-controls');
  const speedSlider = document.getElementById('speed-slider');
  const speedVal = document.getElementById('speed-val');
  const sizeSlider = document.getElementById('size-slider');
  const sizeVal = document.getElementById('size-val');
  const wordCount = document.getElementById('word-count');
  const mirrorToggle = document.getElementById('mirror-toggle');
  const startBtn = document.getElementById('start-btn');
  const clearBtn = document.getElementById('clear-btn');
  const hint = document.getElementById('hint');
  const countdownSlider = document.getElementById('countdown-slider');
  const countdownVal = document.getElementById('countdown-val');
  const countdownOverlay = document.getElementById('countdown-overlay');
  const countdownNumber = document.getElementById('countdown-number');
  const countdownSkip = document.getElementById('countdown-skip');

  let countdownSeconds = 3;
  let countdownTimer = null;

  countdownSlider.addEventListener('input', () => {
    countdownSeconds = parseInt(countdownSlider.value);
    countdownVal.textContent = countdownSeconds + 's';
  });

  // ── WORD COUNT ──
  scriptInput.addEventListener('input', () => {
    const text = scriptInput.value.trim();
    const words = text ? text.split(/\s+/).length : 0;
    wordCount.textContent = words + ' word' + (words !== 1 ? 's' : '');
  });

  // ── SPEED SLIDER ──
  speedSlider.addEventListener('input', () => {
    scrollSpeed = parseInt(speedSlider.value);
    speedVal.textContent = scrollSpeed;
    liveSpeed.textContent = scrollSpeed;
  });

  // ── SIZE SLIDER ──
  const sizeMap = [1.2, 1.55, 1.85, 2.1, 2.4, 2.75, 3.1, 3.5, 4.0, 4.6];
  sizeSlider.addEventListener('input', () => {
    const idx = parseInt(sizeSlider.value) - 1;
    sizeVal.textContent = sizeSlider.value;
    prompterText.style.fontSize = sizeMap[idx] + 'rem';
  });

  // ── MIRROR ──
  mirrorToggle.addEventListener('click', () => {
    isMirrored = !isMirrored;
    mirrorToggle.classList.toggle('on', isMirrored);
    prompterText.classList.toggle('mirrored', isMirrored);
  });

  // ── CLEAR ──
  clearBtn.addEventListener('click', () => {
    if (confirm('Clear the script?')) {
      scriptInput.value = '';
      wordCount.textContent = '0 words';
    }
  });

  // ── START ──
  startBtn.addEventListener('click', () => {
    const text = scriptInput.value.trim();
    if (!text) { showHint('Add a script first'); return; }
    prompterText.textContent = text;
    prompterText.classList.toggle('mirrored', isMirrored);
    scrollPos = 0;
    scrollContainer.scrollTop = 0;
    editorView.style.display = 'none';
    prompterView.classList.add('active');

    if (countdownSeconds > 0) {
      runCountdown(countdownSeconds);
    } else {
      startScroll();
      showHintBrief('Tap center to pause. Tap sides to adjust speed.');
    }
  });

  function runCountdown(seconds) {
    countdownOverlay.classList.add('active');
    let remaining = seconds;
    countdownNumber.textContent = remaining;
    countdownNumber.style.animation = 'none';
    void countdownNumber.offsetWidth;
    countdownNumber.style.animation = 'pulseCount 1s ease-out';

    countdownTimer = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(countdownTimer);
        countdownOverlay.classList.remove('active');
        startScroll();
        showHintBrief('Tap center to pause. Tap sides to adjust speed.');
      } else {
        countdownNumber.textContent = remaining;
        countdownNumber.style.animation = 'none';
        void countdownNumber.offsetWidth;
        countdownNumber.style.animation = 'pulseCount 1s ease-out';
      }
    }, 1000);
  }

  countdownSkip.addEventListener('click', () => {
    clearInterval(countdownTimer);
    countdownOverlay.classList.remove('active');
    startScroll();
    showHintBrief('Tap center to pause. Tap sides to adjust speed.');
  });

  // ── PLAY / PAUSE ──
  function startScroll() {
    isPlaying = true;
    playPauseBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg> Pause';
    playPauseBtn.className = 'prompter-btn pause';
    animate();
  }

  function pauseScroll() {
    isPlaying = false;
    cancelAnimationFrame(rafId);
    playPauseBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Play';
    playPauseBtn.className = 'prompter-btn play';
  }

  playPauseBtn.addEventListener('click', () => {
    isPlaying ? pauseScroll() : startScroll();
  });

  // ── STOP ──
  stopBtn.addEventListener('click', exitPrompter);

  function exitPrompter() {
    pauseScroll();
    clearInterval(countdownTimer);
    countdownOverlay.classList.remove('active');
    prompterView.classList.remove('active');
    editorView.style.display = 'flex';
    scrollPos = 0;
  }

  // ── ANIMATE ──
  function animate() {
    if (!isPlaying) return;
    const pxPerFrame = scrollSpeed * 0.4;
    scrollPos += pxPerFrame;
    scrollContainer.scrollTop = scrollPos;

    // Progress
    const total = scrollContainer.scrollHeight - scrollContainer.clientHeight;
    const pct = total > 0 ? (scrollPos / total) * 100 : 0;
    progressFill.style.width = Math.min(pct, 100) + '%';

    // Auto stop at end
    if (scrollPos >= total) {
      pauseScroll();
      showHint('End of script');
      return;
    }

    rafId = requestAnimationFrame(animate);
  }

  // ── SPEED CONTROLS ──
  speedUpBtn.addEventListener('click', () => changeSpeed(1));
  speedDownBtn.addEventListener('click', () => changeSpeed(-1));

  function changeSpeed(delta) {
    scrollSpeed = Math.max(1, Math.min(10, scrollSpeed + delta));
    liveSpeed.textContent = scrollSpeed;
    speedSlider.value = scrollSpeed;
    speedVal.textContent = scrollSpeed;
    showHint('Speed: ' + scrollSpeed);
  }

  // ── TAP ZONES (mobile) ──
  document.getElementById('tap-left').addEventListener('click', () => { changeSpeed(-1); });
  document.getElementById('tap-right').addEventListener('click', () => { changeSpeed(1); });
  document.getElementById('tap-center').addEventListener('click', () => {
    isPlaying ? pauseScroll() : startScroll();
    showControls();
  });

  // ── AUTO-HIDE CONTROLS ──
  function showControls() {
    controlsVisible = true;
    prompterControls.classList.remove('hidden');
    clearTimeout(controlsTimeout);
    controlsTimeout = setTimeout(() => {
      if (isPlaying) prompterControls.classList.add('hidden');
    }, 3500);
  }

  prompterView.addEventListener('mousemove', showControls);
  prompterView.addEventListener('touchstart', showControls, { passive: true });

  // ── KEYBOARD ──
  document.addEventListener('keydown', (e) => {
    if (!prompterView.classList.contains('active')) return;
    if (e.key === ' ') { e.preventDefault(); isPlaying ? pauseScroll() : startScroll(); showControls(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); changeSpeed(1); showControls(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); changeSpeed(-1); showControls(); }
    if (e.key === 'Escape') exitPrompter();
  });

  // ── HINT ──
  let hintTimeout;
  function showHint(msg) {
    hint.textContent = msg;
    hint.style.opacity = '1';
    clearTimeout(hintTimeout);
    hintTimeout = setTimeout(() => hint.style.opacity = '0', 2000);
  }

  function showHintBrief(msg) {
    hint.textContent = msg;
    hint.style.opacity = '1';
    clearTimeout(hintTimeout);
    hintTimeout = setTimeout(() => hint.style.opacity = '0', 4000);
  }
</script>
</body>
</html>
